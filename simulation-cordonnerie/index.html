<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation de Cordonnerie</title>
    <meta
      name="description"
      content="Atelier premium interactif de diagnostic et reparation de chaussure."
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="app-header" role="banner">
        <div class="header-title">
          <p class="kicker">Simulation de Cordonnerie</p>
          <h1>Atelier H&eacute;ritage</h1>
        </div>
        <div class="header-chips" aria-label="Statistiques session">
          <article class="chip">
            <span>Jour</span>
            <strong id="day-chip">1</strong>
          </article>
          <article class="chip chip-reputation">
            <span>R&eacute;putation</span>
            <strong id="reputation-chip">50</strong>
          </article>
          <article class="chip">
            <span>Niveau</span>
            <strong id="level-chip">Apprenti</strong>
          </article>
          <article class="chip">
            <span>Score</span>
            <strong id="score-chip">0</strong>
          </article>
        </div>
      </header>

      <main class="atelier-layout" aria-label="Interface atelier premium">
        <section class="panel shoe-panel" aria-labelledby="shoe-panel-title">
          <div class="panel-head">
            <h2 id="shoe-panel-title">Chaussure</h2>
            <p class="panel-sub">Diagnostic visuel interactif</p>
          </div>

          <div class="svg-shell" id="svg-shell">
            <svg
              id="shoe-svg"
              class="shoe-svg"
              viewBox="0 0 760 360"
              role="img"
              aria-labelledby="shoe-svg-title shoe-svg-desc"
            >
              <title id="shoe-svg-title">Chaussure de diagnostic</title>
              <desc id="shoe-svg-desc">
                Cliquez une zone de la chaussure pour lancer un diagnostic.
              </desc>

              <defs>
                <linearGradient id="upperLeatherGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#8c2f0f" />
                  <stop offset="100%" stop-color="#a43d13" />
                </linearGradient>
                <linearGradient id="soleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#6a574a" />
                  <stop offset="100%" stop-color="#4f3f35" />
                </linearGradient>
                <filter id="part-glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c6a45a" flood-opacity="0.55" />
                </filter>
              </defs>

              <rect x="0" y="0" width="760" height="360" class="svg-bg" />
              <ellipse cx="386" cy="324" rx="292" ry="16" class="boot-shadow" />

              <!-- Illustration botte (profil atelier) -->
              <g class="tech-drawing">
                <path
                  class="boot-upper"
                  d="M142 266 C182 224 258 194 356 178 C430 166 508 164 568 176 C608 184 638 204 656 230 L656 286 L214 286 C182 286 160 280 142 266 Z"
                />
                <path
                  class="boot-shaft"
                  d="M462 78 L602 74 C628 74 646 92 646 118 L646 228 C646 252 638 268 620 278 L536 278 L462 262 Z"
                />
                <path
                  class="boot-quarter"
                  d="M252 254 C320 216 408 196 508 196 C560 196 606 206 638 224 L638 252 C604 234 560 224 506 224 C412 224 326 244 264 272 Z"
                />
                <path
                  class="boot-toecap"
                  d="M96 266 C120 238 156 224 198 224 C223 224 242 236 252 256 C260 270 262 280 258 286 C214 292 164 288 122 274 C104 268 96 270 96 266 Z"
                />

                <!-- Semelle horizontale et talon aligne -->
                <path
                  class="sole-base"
                  d="M90 286 C210 282 470 282 676 288 L676 314 C470 320 212 320 90 314 Z"
                />
                <path class="heel-cap" d="M538 254 L592 248 L586 314 L528 314 Z" />
                <path class="heel-block" d="M592 250 L676 250 L676 314 L586 314 Z" />
                <path class="sole-tread" d="M108 306 L664 306" />

                <!-- Coutures et details -->
                <path class="stitch-line" d="M214 250 C326 210 460 195 612 208" />
                <path class="stitch-line" d="M224 262 C336 224 468 210 618 222" />
                <path class="stitch-line" d="M236 274 C346 236 476 224 620 236" />
                <path class="tech-detail" d="M470 96 C522 92 572 92 618 100" />

                <circle cx="444" cy="148" r="7" class="eyelet" />
                <circle cx="436" cy="176" r="7" class="eyelet" />
                <circle cx="428" cy="204" r="8" class="eyelet" />
                <circle cx="420" cy="232" r="8" class="eyelet" />
                <line x1="432" y1="150" x2="462" y2="144" class="lace-seg" />
                <line x1="424" y1="178" x2="456" y2="170" class="lace-seg" />
                <line x1="416" y1="206" x2="452" y2="196" class="lace-seg" />
                <line x1="408" y1="234" x2="448" y2="222" class="lace-seg" />

                <!-- Appels de texte -->
                <g class="callout-group">
                  <line x1="242" y1="234" x2="110" y2="234" class="callout-line" />
                  <text x="42" y="238" class="callout-label">Empeigne</text>
                </g>
                <g class="callout-group">
                  <line x1="606" y1="210" x2="644" y2="208" class="callout-line" />
                  <text x="648" y="213" class="callout-label">Couture</text>
                </g>
                <g class="callout-group">
                  <line x1="610" y1="274" x2="646" y2="270" class="callout-line" />
                  <text x="650" y="275" class="callout-label">Talon</text>
                </g>
                <g class="callout-group">
                  <line x1="602" y1="306" x2="644" y2="306" class="callout-line" />
                  <text x="648" y="311" class="callout-label">Semelle</text>
                </g>
              </g>

              <!-- Zones interactives -->

              <g
                class="shoe-part"
                data-part="semelle"
                role="button"
                tabindex="0"
                aria-label="Zone semelle"
              >
                <title>Semelle</title>
                <path
                  d="M90 284 C210 280 470 280 676 286 L676 316 C470 322 212 322 90 316 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="talon"
                role="button"
                tabindex="0"
                aria-label="Zone talon"
              >
                <title>Talon</title>
                <path
                  d="M592 248 L676 248 L676 316 L584 316 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="empeigne"
                role="button"
                tabindex="0"
                aria-label="Zone empeigne"
              >
                <title>Empeigne</title>
                <path
                  d="M140 264 C180 222 256 192 356 176 C432 164 510 162 570 174 C608 182 638 202 656 230 L656 258 C626 238 582 228 524 226 C422 224 322 238 214 286 C182 286 160 280 140 264 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="couture"
                role="button"
                tabindex="0"
                aria-label="Zone couture"
              >
                <title>Couture</title>
                <!-- Hitbox elargie pour clic confortable -->
                <path
                  d="M214 250 C326 210 460 195 612 208"
                  class="part-hitline"
                />
                <path
                  d="M214 250 C326 210 460 195 612 208"
                  class="part-shape part-shape-line"
                />
              </g>
            </svg>

            <div id="part-tooltip" class="part-tooltip" role="status" aria-live="polite"></div>
          </div>
        </section>

        <aside class="side-panels" aria-label="Panneaux de mission">
          <section class="panel" aria-labelledby="diag-title">
            <div class="panel-head">
              <h2 id="diag-title">Diagnostic</h2>
              <span id="diagnostic-severity" class="severity severity-neutral">Aucun</span>
            </div>
            <p id="diagnostic-text" class="diagnostic-text">
              Selectionnez une partie de la chaussure pour analyser son etat.
            </p>
            <div class="selection-line">
              <span>Piece selectionnee</span>
              <strong id="selected-part-label">-</strong>
            </div>
          </section>

          <section class="panel" aria-labelledby="actions-title">
            <div class="panel-head">
              <h2 id="actions-title">Actions</h2>
              <button id="reset-ui-btn" class="btn" type="button">Reinitialiser</button>
            </div>
            <div
              id="actions-list"
              class="actions-list"
              role="group"
              aria-label="Actions de reparation"
            ></div>
          </section>

          <section class="panel" aria-labelledby="history-title">
            <div class="panel-head">
              <h2 id="history-title">Historique</h2>
            </div>
            <ul id="history-list" class="history-list" aria-live="polite"></ul>
          </section>
        </aside>
      </main>
    </div>

    <noscript>Cette simulation necessite JavaScript.</noscript>
    <script type="module" src="./js/game.js"></script>
  </body>
</html>
