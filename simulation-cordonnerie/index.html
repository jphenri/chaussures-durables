<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation de Cordonnerie</title>
    <meta
      name="description"
      content="Atelier premium interactif de diagnostic et reparation de chaussure."
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="app-header" role="banner">
        <div class="header-title">
          <p class="kicker">Simulation de Cordonnerie</p>
          <h1>Atelier H&eacute;ritage</h1>
        </div>
        <div class="header-chips" aria-label="Statistiques session">
          <article class="chip">
            <span>Jour</span>
            <strong id="day-chip">1</strong>
          </article>
          <article class="chip chip-reputation">
            <span>R&eacute;putation</span>
            <strong id="reputation-chip">50</strong>
          </article>
          <article class="chip">
            <span>Niveau</span>
            <strong id="level-chip">Apprenti</strong>
          </article>
          <article class="chip">
            <span>Score</span>
            <strong id="score-chip">0</strong>
          </article>
        </div>
      </header>

      <main class="atelier-layout" aria-label="Interface atelier premium">
        <section class="panel shoe-panel" aria-labelledby="shoe-panel-title">
          <div class="panel-head">
            <h2 id="shoe-panel-title">Chaussure</h2>
            <p class="panel-sub">Diagnostic visuel interactif</p>
          </div>

          <div class="svg-shell" id="svg-shell">
            <svg
              id="shoe-svg"
              class="shoe-svg"
              viewBox="0 0 188.76117 127.00133"
              role="img"
              aria-labelledby="shoe-svg-title shoe-svg-desc"
            >
              <title id="shoe-svg-title">Chaussure de diagnostic</title>
              <desc id="shoe-svg-desc">
                Cliquez une zone de la chaussure pour lancer un diagnostic.
              </desc>

              <defs>
                <filter id="part-glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c6a45a" flood-opacity="0.55" />
                </filter>
              </defs>

              <rect x="0" y="0" width="188.76117" height="127.00133" class="svg-bg" />
              <image
                href="../assets/img/sora/Chaussure_icone.svg"
                x="0"
                y="0"
                width="188.76117"
                height="127.00133"
                preserveAspectRatio="xMidYMid meet"
                class="shoe-illustration"
              />

              <!-- Hitboxes de diagnostic au-dessus de l'icone SVG source. -->

              <g
                class="shoe-part"
                data-part="semelle"
                role="button"
                tabindex="0"
                aria-label="Zone semelle"
              >
                <title>Semelle</title>
                <path
                  d="M8 109 C34 107 94 106 144 106 C161 106 174 105 186 104 L186 118 L8 118 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="talon"
                role="button"
                tabindex="0"
                aria-label="Zone talon"
              >
                <title>Talon</title>
                <path
                  d="M128 80 L168 80 L164 113 L126 113 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="couture"
                role="button"
                tabindex="0"
                aria-label="Zone couture"
              >
                <title>Couture</title>
                <path
                  d="M67 83 C83 74 106 69 130 69 C145 69 155 71 163 75 L162 80 C148 76 129 75 109 78 C95 80 80 84 69 89 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="empeigne"
                role="button"
                tabindex="0"
                aria-label="Zone empeigne"
              >
                <title>Empeigne</title>
                <path
                  d="M54 73 C71 56 97 47 129 45 C145 44 156 47 162 53 C164 58 165 66 164 77 C146 72 124 72 105 75 C84 79 67 86 55 95 C53 87 52 79 54 73 Z"
                  class="part-shape"
                />
              </g>
            </svg>

            <div id="part-tooltip" class="part-tooltip" role="status" aria-live="polite"></div>
          </div>
        </section>

        <aside class="side-panels" aria-label="Panneaux de mission">
          <section class="panel" aria-labelledby="diag-title">
            <div class="panel-head">
              <h2 id="diag-title">Diagnostic</h2>
              <span id="diagnostic-severity" class="severity severity-neutral">Aucun</span>
            </div>
            <p id="diagnostic-text" class="diagnostic-text">
              Selectionnez une partie de la chaussure pour analyser son etat.
            </p>
            <div class="selection-line">
              <span>Piece selectionnee</span>
              <strong id="selected-part-label">-</strong>
            </div>
          </section>

          <section class="panel" aria-labelledby="actions-title">
            <div class="panel-head">
              <h2 id="actions-title">Actions</h2>
              <button id="reset-ui-btn" class="btn" type="button">Reinitialiser</button>
            </div>
            <div
              id="actions-list"
              class="actions-list"
              role="group"
              aria-label="Actions de reparation"
            ></div>
          </section>

          <section class="panel" aria-labelledby="history-title">
            <div class="panel-head">
              <h2 id="history-title">Historique</h2>
            </div>
            <ul id="history-list" class="history-list" aria-live="polite"></ul>
          </section>
        </aside>
      </main>
    </div>

    <noscript>Cette simulation necessite JavaScript.</noscript>
    <script type="module" src="./js/game.js"></script>
  </body>
</html>
