<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulation de Cordonnerie</title>
    <meta
      name="description"
      content="Atelier premium interactif de diagnostic et reparation de chaussure."
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-wrap">
      <header class="app-header" role="banner">
        <div class="header-title">
          <p class="kicker">Simulation de Cordonnerie</p>
          <h1>Atelier H&eacute;ritage</h1>
        </div>
        <div class="header-chips" aria-label="Statistiques session">
          <article class="chip">
            <span>Jour</span>
            <strong id="day-chip">1</strong>
          </article>
          <article class="chip chip-reputation">
            <span>R&eacute;putation</span>
            <strong id="reputation-chip">50</strong>
          </article>
          <article class="chip">
            <span>Niveau</span>
            <strong id="level-chip">Apprenti</strong>
          </article>
          <article class="chip">
            <span>Score</span>
            <strong id="score-chip">0</strong>
          </article>
        </div>
      </header>

      <main class="atelier-layout" aria-label="Interface atelier premium">
        <section class="panel shoe-panel" aria-labelledby="shoe-panel-title">
          <div class="panel-head">
            <h2 id="shoe-panel-title">Chaussure</h2>
            <p class="panel-sub">Diagnostic visuel interactif</p>
          </div>

          <div class="svg-shell" id="svg-shell">
            <svg
              id="shoe-svg"
              class="shoe-svg"
              viewBox="0 0 760 360"
              role="img"
              aria-labelledby="shoe-svg-title shoe-svg-desc"
            >
              <title id="shoe-svg-title">Chaussure de diagnostic</title>
              <desc id="shoe-svg-desc">
                Cliquez une zone de la chaussure pour lancer un diagnostic.
              </desc>

              <defs>
                <linearGradient id="upperLeatherGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#8c2f0f" />
                  <stop offset="100%" stop-color="#a43d13" />
                </linearGradient>
                <linearGradient id="soleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#6a574a" />
                  <stop offset="100%" stop-color="#4f3f35" />
                </linearGradient>
                <filter id="part-glow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c6a45a" flood-opacity="0.55" />
                </filter>
              </defs>

              <rect x="0" y="0" width="760" height="360" class="svg-bg" />
              <ellipse cx="390" cy="322" rx="284" ry="16" class="boot-shadow" />

              <!-- Illustration style schema technique -->
              <g class="tech-drawing">
                <!-- Tige / empeigne -->
                <path
                  class="tech-outline"
                  d="M146 257 C226 208 338 182 506 188 C554 190 594 204 618 228 L618 290 L178 290 C162 290 152 278 146 257 Z"
                />
                <path
                  class="tech-outline"
                  d="M456 120 L600 116 C614 116 624 126 624 140 L624 226 C624 244 620 256 610 266 L554 266 L456 260 Z"
                />
                <path
                  class="tech-detail"
                  d="M184 252 C284 214 426 198 576 210"
                />
                <path
                  class="tech-detail"
                  d="M196 262 C300 224 440 210 584 222"
                />
                <path
                  class="tech-detail"
                  d="M468 158 C532 152 574 152 604 158"
                />
                <circle cx="444" cy="150" r="7" class="eyelet" />
                <circle cx="436" cy="182" r="8" class="eyelet" />
                <circle cx="426" cy="216" r="9" class="eyelet" />
                <circle cx="388" cy="240" r="10" class="eyelet" />

                <!-- Pieces eclatees de semelle -->
                <path
                  class="sole-layer layer-top"
                  d="M500 252 C538 247 582 247 622 252 C612 268 598 278 576 286 C546 287 518 286 494 283 Z"
                />
                <path
                  class="sole-layer layer-mid"
                  d="M488 274 C530 268 586 266 642 270 C634 288 620 298 592 307 C548 309 510 307 480 302 Z"
                />
                <path
                  class="sole-layer layer-bottom"
                  d="M476 296 C536 291 610 289 678 292 C674 304 658 316 620 324 C548 327 494 324 468 318 Z"
                />

                <!-- Semelle principale montee -->
                <path
                  class="sole-base"
                  d="M96 292 C210 286 460 286 670 292 L670 314 C472 322 224 322 96 314 Z"
                />
                <path class="heel-block" d="M598 258 L670 258 L670 314 L592 314 Z" />

                <!-- Appels de texte style plan -->
                <g class="callout-group">
                  <line x1="196" y1="226" x2="92" y2="226" class="callout-line" />
                  <text x="32" y="230" class="callout-label">Empeigne</text>
                </g>
                <g class="callout-group">
                  <line x1="604" y1="300" x2="710" y2="300" class="callout-line" />
                  <text x="716" y="304" class="callout-label">Semelle</text>
                </g>
                <g class="callout-group">
                  <line x1="596" y1="274" x2="708" y2="262" class="callout-line" />
                  <text x="716" y="266" class="callout-label">Talon</text>
                </g>
                <g class="callout-group">
                  <line x1="500" y1="210" x2="708" y2="204" class="callout-line" />
                  <text x="716" y="208" class="callout-label">Coutures</text>
                </g>
              </g>

              <!-- Zones interactives -->

              <g
                class="shoe-part"
                data-part="semelle"
                role="button"
                tabindex="0"
                aria-label="Zone semelle"
              >
                <title>Semelle</title>
                <path
                  d="M94 288 C210 284 462 284 670 290 L670 316 C470 324 222 324 94 316 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="talon"
                role="button"
                tabindex="0"
                aria-label="Zone talon"
              >
                <title>Talon</title>
                <path
                  d="M596 254 L670 254 L670 316 L590 316 Z"
                  class="part-shape"
                />
              </g>

              <g
                class="shoe-part"
                data-part="couture"
                role="button"
                tabindex="0"
                aria-label="Zone couture"
              >
                <title>Couture</title>
                <path
                  d="M190 258 C304 218 446 206 588 220"
                  class="part-shape part-shape-line"
                />
              </g>

              <g
                class="shoe-part"
                data-part="empeigne"
                role="button"
                tabindex="0"
                aria-label="Zone empeigne"
              >
                <title>Empeigne</title>
                <path
                  d="M136 258 C220 204 336 178 504 182 C556 184 598 202 624 228 L624 270 C624 280 620 286 612 292 L178 292 C160 292 148 282 136 258 Z"
                  class="part-shape"
                />
              </g>
            </svg>

            <div id="part-tooltip" class="part-tooltip" role="status" aria-live="polite"></div>
          </div>
        </section>

        <aside class="side-panels" aria-label="Panneaux de mission">
          <section class="panel" aria-labelledby="diag-title">
            <div class="panel-head">
              <h2 id="diag-title">Diagnostic</h2>
              <span id="diagnostic-severity" class="severity severity-neutral">Aucun</span>
            </div>
            <p id="diagnostic-text" class="diagnostic-text">
              Selectionnez une partie de la chaussure pour analyser son etat.
            </p>
            <div class="selection-line">
              <span>Piece selectionnee</span>
              <strong id="selected-part-label">-</strong>
            </div>
          </section>

          <section class="panel" aria-labelledby="actions-title">
            <div class="panel-head">
              <h2 id="actions-title">Actions</h2>
              <button id="reset-ui-btn" class="btn" type="button">Reinitialiser</button>
            </div>
            <div
              id="actions-list"
              class="actions-list"
              role="group"
              aria-label="Actions de reparation"
            ></div>
          </section>

          <section class="panel" aria-labelledby="history-title">
            <div class="panel-head">
              <h2 id="history-title">Historique</h2>
            </div>
            <ul id="history-list" class="history-list" aria-live="polite"></ul>
          </section>
        </aside>
      </main>
    </div>

    <noscript>Cette simulation necessite JavaScript.</noscript>
    <script type="module" src="./js/game.js"></script>
  </body>
</html>
